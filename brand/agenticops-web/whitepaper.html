<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Technical whitepaper · AgenticOps &amp; Chrysalis</title>
  <meta name="description" content="Technical whitepaper: AgenticOps operating model and Chrysalis verification-backed migration engine." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#020208" />
  <link rel="canonical" href="https://agenticop.io/whitepaper.html" />
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/agenticops.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body class="ao-page" data-ao-page="whitepaper">
  <div class="ao-bg-fx" aria-hidden="true"><div class="ao-vignette"></div><div class="ao-orb ao-orb-a"></div><div class="ao-orb ao-orb-b"></div><div class="ao-grid"></div><div class="ao-noise"></div></div>
  <header class="ao-nav" role="banner" id="ao-site-nav"></header>

  <main class="ao-page-main">
    <section class="ao-section ao-page-hero">
      <div class="ao-wrap">
        <p class="ao-kicker">Technical whitepaper</p>
        <h1 class="ao-page-title">AgenticOps &amp; Chrysalis</h1>
        <p class="ao-sub">
          Canonical markdown lives in git at <strong>docs/WHITEPAPER.md</strong>. This page loads the deployed copy <strong>WHITEPAPER.md</strong> and renders it here.
        </p>
      </div>
    </section>
    <section class="ao-section">
      <div class="ao-wrap">
        <div id="ao-whitepaper-body" class="ao-markdown-prose" aria-busy="true"></div>
        <p class="ao-muted" id="ao-whitepaper-err" hidden></p>
        <p class="ao-next-page"><a href="/proof.html#chrysalis">Proof &amp; Chrysalis →</a></p>
      </div>
    </section>
  </main>

  <footer class="ao-footer" id="ao-site-footer"></footer>
  <script src="/ao-layout.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var el = document.getElementById('ao-whitepaper-body');
      var err = document.getElementById('ao-whitepaper-err');
      function fail(msg) {
        el.removeAttribute('aria-busy');
        err.hidden = false;
        err.textContent = msg;
      }
      if (typeof marked === 'undefined') {
        fail('Markdown renderer failed to load.');
        return;
      }
      fetch('/WHITEPAPER.md', { cache: 'no-store' })
        .then(function (res) {
          if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
          return res.text();
        })
        .then(function (md) {
          el.innerHTML = marked.parse(md, { headerIds: true });
          el.removeAttribute('aria-busy');
        })
        .catch(function (e) {
          fail('Could not load WHITEPAPER.md (' + (e && e.message ? e.message : e) + '). Sync docs/WHITEPAPER.md to the root WHITEPAPER.md before deploy.');
        });
    });
  </script>
</body>
</html>
